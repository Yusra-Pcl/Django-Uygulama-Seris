<!DOCTYPE html>
<html>
<head>
    <title>Anketler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container shadow p-4 bg-white rounded">
        <h1 class="text-primary border-bottom pb-2">📊 Güncel Anketler</h1>
        
        {% if latest_question_list %}
            <div class="list-group mt-3">
            {% for question in latest_question_list %}
                <a href="{% url 'polls:detail' question.id %}" class="list-group-item list-group-item-action p-3">
                    <strong>{{ question.question_text }}</strong>
                </a>
            {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-warning mt-3">Henüz hiç anket eklenmemiş!</div>
        {% endif %}

        <hr>
        <div class="mt-4">
            <a href="/admin/" class="btn btn-outline-dark btn-sm">⚙ Yönetim Paneli (Soru Ekle)</a>
        </div>
    </div>
</body>
</html>
