<!DOCTYPE html>
<html>
<head>
    <title>Todo Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">📋 Yapılacaklar Listem (App 3)</h2>
        <div class="list-group">
            {% for task in tasks %}
                <div class="list-group-item d-flex justify-content-between">
                    <span>{{ task.title }}</span>
                    <span class="badge bg-primary">{{ task.get_priority_display }}</span>
                </div>
            {% empty %}
                <div class="alert alert-info">Henüz hiç görev eklenmemiş. Admin panelinden ekle!</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
