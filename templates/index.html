<!DOCTYPE html>
<html>
<head>
    <title>Tuna Proje Portalı</title>
    <style>
        body { font-family: sans-serif; background: #f8fafb; text-align: center; padding: 50px; }
       .box {
    background: rgb(151, 123, 165);
    max-width: 500px; /* Genişliği 500px olarak varsaydım */
    margin: auto;
    padding: 40px;
    border-radius: 20px;
    
    /* İŞTE YENİ EKLENEN ÇERÇEVE KODLARI: */
    border: 3px solid #34495e; /* Kalınlık, stil (düz) ve koyu lacivert renk */
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Etrafına hafif bir gölge ekleyerek derinlik katar */
}
        .btn { display: block; background: #3498db; color: rgb(240, 245, 248); padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h1> Yüsra'nın Projesi</h1>
        <p>Ana Giriş!</p>
        <hr>
        <a href="/polls/" class="btn">📊 Anket Uygulamasına Git</a>
        <a href="/admin/" class="btn" style="background: #0fc567;">🛡️ Yönetim Paneli (Yüsra Proje)</a>
    </div>
</body>
</html>
