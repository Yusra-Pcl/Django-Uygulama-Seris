<!DOCTYPE html>
<html>
<head>
    <title>Tuna Hava Durumu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .weather-card { background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); color: white; border-radius: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h2 class="mb-4">🌤️ Canlı Hava Durumu (Uygulama 4)</h2>
                
                <form method="POST" class="d-flex mb-4">
                    {% csrf_token %}
                    <input type="text" name="city" class="form-control me-2" placeholder="Şehir ismi girin... (Örn: Ankara)">
                    <button type="submit" class="btn btn-primary">Ara</button>
                </form>

                {% if weather %}
                <div class="card weather-card shadow p-4">
                    <h3>{{ weather.city|upper }}</h3>
                    <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="ikon" style="width: 100px; margin: auto;">
                    <h1 class="display-3 fw-bold">{{ weather.temperature }}°C</h1>
                    <p class="lead text-capitalize">{{ weather.description }}</p>
                </div>
                {% else %}
                <div class="alert alert-warning">Lütfen geçerli bir şehir ismi girin.</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
