<!DOCTYPE html>
<html>
<head>
    <title>Tuna Blog | Proje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">🚀 Uygulama 2: Blog Sistemi</span>
        </div>
    </nav>
    <div class="container">
        {% for post in posts %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h2 class="text-primary">{{ post.title }}</h2>
                    <p class="text-muted small">{{ post.published_date }} | {{ post.author }}</p>
                    <p>{{ post.text|linebreaksbr }}</p>
                </div>
            </div>
        {% empty %}
            <p>Henüz paylaşılmış bir yazı yok.</p>
        {% endfor %}
    </div>
</body>
</html>
